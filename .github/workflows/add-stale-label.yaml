name: Issue management - run stale action

on:
  schedule:
    # every 8 hours at 41 past
    - cron: "41 */8 * * *"

permissions:
  contents: read

jobs:
  stale:
    permissions:
      issues: write         # for actions/stale to close stale issues
      pull-requests: write  # for actions/stale to close stale PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 21
          days-before-close: 14
          only-labels: "needs author feedback"
          # PRs in this state are explicitly unstaled by
          # remove-needs-author-feedback.yaml when the author replies. Keeping the
          # stale label in place on other updates avoids the stale/unstale loop
          # that prevents old PRs from ever reaching auto-close.
          remove-pr-stale-when-updated: false
          stale-issue-label: stale
          stale-issue-message: >
            This has been automatically marked as stale because it has been marked
            as needing author feedback and has not had any activity for 21 days.
            It will be closed automatically if there is no response from the author
            within 14 additional days from this comment.
          stale-pr-label: stale
          stale-pr-message: >
            This has been automatically marked as stale because it has been marked
            as needing author feedback and has not had any activity for 21 days.
            It will be closed automatically if there is no response from the author
            within 14 additional days from this comment.
